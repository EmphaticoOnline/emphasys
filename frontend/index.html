<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Título de la aplicación -->
    <title>Emphasys Plataforma Integral de Negocios</title>

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon clásico -->
    <link rel="icon" href="/favicon.ico" />

    <!-- PNG favicon para navegadores modernos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/emphazul_32.png" />

    <!-- Android / PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="/emphazul_192.png" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="/emphazul_180.png" />

    <!-- PWA: manifest + color de tema del navegador/barra de estado -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1d2f68" />

    <!-- Instalación en Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS/Safari: requerido para que "Agregar a pantalla de inicio" se
         comporte como app instalada (modo standalone), condición
         indispensable para que las notificaciones push funcionen en
         iPhone. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Emphasys" />

  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
